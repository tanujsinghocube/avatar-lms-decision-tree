version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:13\n    restart: always\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: mydatabase\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    ports:\n      - '5432:5432'\n\n  redis:\n    image: redis:alpine\n    restart: always\n    ports:\n      - '6379:6379'\n\n  minio:\n    image: minio/minio\n    restart: always\n    environment:\n      MINIO_ACCESS_KEY: minio\n      MINIO_SECRET_KEY: minio123\n    command: server /data\n    ports:\n      - '9000:9000'\n    volumes:\n      - minio_data:/data\n\n  backend:\n    build: ./backend\n    restart: always\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      REDIS_HOST: redis\n      MINIO_ENDPOINT: minio:9000\n    ports:\n      - '4000:4000'\n    depends_on:\n      - postgres\n      - redis\n      - minio\n\n  frontend:\n    build: ./frontend\n    restart: always\n    ports:\n      - '3000:3000'\n    depends_on:\n      - backend\n\n  admin:\n    build: ./admin\n    restart: always\n    ports:\n      - '5000:5000'\n    depends_on:\n      - backend\n\n  tts:\n    build: ./ml_services/tts\n    restart: always\n    depends_on:\n      - backend\n\n  saddtalker:\n    build: ./ml_services/sadtalker\n    restart: always\n    depends_on:\n      - backend\n\n  nlp:\n    build: ./ml_services/nlp\n    restart: always\n    depends_on:\n      - backend\n\nvolumes:\n  postgres_data:\n  minio_data: