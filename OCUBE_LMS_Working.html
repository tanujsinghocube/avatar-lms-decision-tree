<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>OCUBE LMS</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        h1 { text-align: center; }\n        .gradient { background: linear-gradient(to right, #5f2c91, #49a09d); color: white; padding: 20px; }\n        #login, #mainApp { display: none; }\n        #mainApp { display: none; }\n        nav { display: flex; justify-content: space-around; margin: 20px; }\n    </style>\n    <script>\n        function showMainApp() {\n            document.getElementById('login').style.display = 'none';\n            document.getElementById('mainApp').style.display = 'block';\n        }\n        function playAudio(text) {\n            const msg = new SpeechSynthesisUtterance(text);\n            window.speechSynthesis.speak(msg);\n        }\n        function checkAnswers() {\n            // Placeholder for assessment check logic\n            alert('Your assessment is checked!');\n        }\n    </script>\n</head>\n<body>\n    <div id="login" class="gradient">\n        <h1>Login to OCUBE LMS</h1>\n        <input type="text" id="username" placeholder="Enter your name">\n        <button onclick="showMainApp()">Login</button>\n    </div>\n    <div id="mainApp">\n        <nav>\n            <button onclick="document.getElementById('module').style.display='block'; document.getElementById('tree').style.display='none';">Learning Module</button>\n            <button onclick="document.getElementById('tree').style.display='block'; document.getElementById('module').style.display='none';">Decision Tree</button>\n        </nav>\n        <div id="module" style="display: none;">\n            <h2>Learning Module</h2>\n            <div id="lessons">\n                <div>\n                    <h3>Lesson 1</h3>\n                    <button onclick="playAudio('Lesson 1 content...')">Play</button>\n                </div>\n            </div>\n            <button onclick="checkAnswers()">Final Assessment</button>\n        </div>\n        <div id="tree" style="display: none;">\n            <h2>Decision Tree</h2>\n            <input type="text" id="vocSearch" placeholder="Search VOCs">\n            <button onclick="alert('Filter btn clicked')">Filter</button>\n            <div id="vocDetails">\n                <p>Select a VOC to view details...</p>\n            </div>\n        </div>\n    </div>\n</body>\n</html>\n
